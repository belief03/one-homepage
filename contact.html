                    </div>
                    <div class="contact__field contact__field--email">
                      <label class="contact__label" for="contact-email">メールアドレス</label>
                      <input class="contact__input" id="contact-email" type="email" name="email" required placeholder="example@example.com" autocomplete="email">
                    </div>
                  </div>
                  <div class="contact__field">
                    <label class="contact__label" for="contact-message">ご相談内容（わかる範囲でOK）</label>
                    <textarea class="contact__textarea" id="contact-message" name="message" rows="3" placeholder="例：作りたいもの/困っていることだけでも大丈夫です"></textarea>
                  </div>
                  <button class="contact__submit" type="submit">無料で相談する</button>
                </form>
              </div>
            </div>
          </div>

        <p class="contact__line-note">内容を確認して、原則1営業日以内にご返信します。</p>
